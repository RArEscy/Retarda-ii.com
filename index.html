<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Galerie imagini</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:10px;
    padding:20px;
}

img{
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>Galerie</h1>

<div id="gallery"></div>

<script>
let gallery = document.getElementById("gallery");

let i = 1;

function loadImages(){

    let img = new Image();
    img.src = "images/" + i + ".jpg";

    img.onload = function(){
        gallery.appendChild(img);
        i++;
        loadImages(); // încearcă următoarea imagine
    }

}

loadImages();
</script>

</body>
</html>
