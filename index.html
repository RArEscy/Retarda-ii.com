<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Galerie</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
padding:20px;
}

img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Galerie imagini</h1>

<div id="gallery"></div>

<script>

fetch("images.json")
.then(response => response.json())
.then(images => {

let gallery = document.getElementById("gallery");

images.forEach(src => {
let img = document.createElement("img");
img.src = src;
gallery.appendChild(img);
});

});

</script>

</body>
</html>
